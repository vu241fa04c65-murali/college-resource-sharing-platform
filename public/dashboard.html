<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Resource Sharing Platform</title>

<style>
body{
    margin:0;
    font-family:Arial;
    overflow: hidden;
}

/* TOP BAR */
.top-bar{
    background:rgb(242, 255, 0);
    color:red;
    padding:4px;
    font-size:40px;
    text-align:center;
    white-space:nowrap;
    overflow:hidden;
}

.top-bar span{
    display:inline-block;
    padding-left:100%;
    animation:moveText 15s linear infinite;
}

@keyframes moveText{
    from{transform:translateX(0);}
    to{transform:translateX(-100%);}
}

/* LAYOUT */
.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* SIDEBAR */
.sidebar{
    width:260px;
    background:#1f2a44;
    padding:15px;
    color:rgba(217, 217, 236, 0.945);
    height: 100%;
}

.sidebar h2{
    text-align:center;
}

.subject-btn{
    width:100%;
    padding:10px;
    margin:10px 0;
    background:#2dd4bf;
    border:none;
    border-radius:6px;
    cursor:pointer;
    font-size:15px;
}

/* CONTENT */
.content{
    flex:1;
    padding:30px;
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    transition:0.5s;
    height:100%;
    overflow-y: auto;
}

.btn{
    padding:10px 15px;
    margin:8px;
    background:#3b82f6;
    color:white;
    border:none;
    border-radius:6px;
    cursor:pointer;
}
.heading-color{
    color:rgb(10, 16, 206);
}
.search-box{
    width:80%;
    padding:8px;
    border-radius:18px;
    border:none;
    margin-bottom:15px;
}
.glass-box{
    background: rgba(255,255,255,0.15);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);

    border-radius:15px;
    border:1px solid rgba(255,255,255,0.3);

    padding:25px;
    width:450px;
}
</style>
</head>

<body>

<div class="top-bar">
    <span>Welcome to Content page</span>
</div>

<div class="container">

    <!-- SIDEBAR -->
    <div class="sidebar">
        <h2>subjects</h2>
        <input type="text" id="searchBar" placeholder="Search subject..."
        onkeyup="searchSubjects()" class="search-box">
        <button class="subject-btn" onclick="management()">Management Science</button>
        <button class="subject-btn" onclick="datastructures()">Data Structures</button>
        <button class="subject-btn" onclick="c_language()">C Language</button>
        <button class="subject-btn" onclick="python()">python</button>
        <button class="subject-btn" onclick="daa()">Design Analysis and Algorithm</button>
        <button class="subject-btn" onclick="Os()">Operating Systems</button>
        
        
    </div>

    <!-- CONTENT -->
    <div class="content" id="content">
        <h2>Select a Subject</h2>
    </div>

</div>

<script>
function openFile(path){
    window.open(path, "_blank");
}
function searchSubjects(){
    let input = document.getElementById("searchBar").value.toLowerCase();
    let buttons = document.getElementsByClassName("subject-btn");

    for(let i=0;i<buttons.length;i++){
        let text = buttons[i].innerText.toLowerCase();

        if(text.includes(input)){
            buttons[i].style.display="block";
        }
        else{
            buttons[i].style.display="none";
        }
    }
}

    `;

function searchTopics(){

let input = document.getElementById("topicSearch").value.toLowerCase();
let topics = document.getElementsByClassName("topic-btn");

for(let i=0;i<topics.length;i++){

let text = topics[i].innerText.toLowerCase();

if(text.includes(input)){
topics[i].style.display = "inline-block";
}
else{
topics[i].style.display = "none";
}

}

}
