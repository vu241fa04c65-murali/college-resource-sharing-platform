<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>College Resource Sharing Platform - Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Segoe UI', Arial, sans-serif;
}

body{
    height:100vh;
    overflow:hidden;
    position:relative;
}

/* Background */
.bg-animation{
    position:absolute;
    top:-100%;
    left:0;
    width:100%;
    height:200%;
    background:url("https://vignanits.ac.in/wp-content/uploads/2021/05/55.png") no-repeat center;
    background-size:cover;
    animation:bgMove 30s linear infinite;
    z-index:-2;
}

@keyframes bgMove{
    0%{ transform:translateY(0); }
    100%{ transform:translateY(50%); }
}

.overlay{
    position:absolute;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.15);
    z-index:-1;
}

/* Top Bar */
.top-bar{
    position:fixed;
    top:0;
    width:100%;
    height:60px;
    background:linear-gradient(90deg,#ff512f,#dd2476,#667eea);
    display:flex;
    align-items:center;
    overflow:hidden;
    z-index:10;
}

.top-text{
    white-space:nowrap;
    padding-left:100%;
    font-size:26px;
    font-weight:600;
    color:white;
    animation:slideText 15s linear infinite;
}

@keyframes slideText{
    0%{transform:translateX(0);}
    100%{transform:translateX(-100%);}
}

/* Layout */
.main-container{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding-top:60px;
}

/* Card */
.login-container{
    background:white;
    width:380px;
    padding:30px;
    border-radius:12px;
    text-align:center;
    box-shadow:0 12px 28px rgba(0,0,0,0.4);
}

.login-container h2{
    margin-bottom:20px;
}

.input-box{
    margin-bottom:15px;
}

.input-box input{
    width:100%;
    padding:10px;
    border-radius:8px;
    border:1px solid #ccc;
}

.login-btn{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#667eea;
    color:white;
    font-size:16px;
    cursor:pointer;
}

.login-btn:hover{
    background:#5a67d8;
}

.switch-text{
    margin-top:15px;
    font-size:14px;
}

.switch-text span{
    color:#667eea;
    cursor:pointer;
    font-weight:bold;
}

.footer-text{
    margin-top:15px;
    font-size:13px;
    color:#777;
}
</style>
</head>

<body>

<div class="bg-animation"></div>
<div class="overlay"></div>

<div class="top-bar">
    <div class="top-text">
        Welcome to College Resource Sharing Platform
    </div>
</div>

<div class="main-container">
    <div class="login-container">

        <!-- LOGIN FORM -->
        <div id="loginForm">
            <h2>Login</h2>

            <div class="input-box">
                <input type="email" id="email" placeholder="Enter your email">
            </div>

            <div class="input-box">
                <input type="password" id="password" placeholder="Enter your password">
            </div>

            <button class="login-btn" onclick="login()">Login</button>

            <div class="switch-text">
                Don't have an account?
                <span onclick="showSignup()">Sign Up</span>
            </div>
        </div>

        <!-- SIGNUP FORM -->
        <div id="signupForm" style="display:none;">
            <h2>Create Account</h2>

            <div class="input-box">
                <input type="text" id="newName" placeholder="Full Name">
            </div>

            <div class="input-box">
                <input type="email" id="newEmail" placeholder="Email">
            </div>

            <div class="input-box">
                <input type="password" id="newPassword" placeholder="Password">
            </div>

            <button class="login-btn" onclick="register()">Create Account</button>

            <div class="switch-text">
                Already have an account?
                <span onclick="showLogin()">Login</span>
            </div>
        </div>

        <div class="footer-text">College Resource Sharing Platform</div>

    </div>
</div>

<script>

// create default admin if not exists
if(!localStorage.getItem("users")){
    const defaultUsers = [
        { email: "admin@gmail.com", password: "admin123" }
    ];
    localStorage.setItem("users", JSON.stringify(defaultUsers));
}

// login function
function login(){
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const users = JSON.parse(localStorage.getItem("users"));

    const validUser = users.find(user => 
        user.email === email && user.password === password
    );

    if(validUser){

        // Store current logged in user
        localStorage.setItem("currentUser", email);

        // Store login history
        let loginHistory = JSON.parse(localStorage.getItem("loginHistory")) || [];
        loginHistory.push({
            email: email,
            time: new Date().toLocaleString()
        });

        localStorage.setItem("loginHistory", JSON.stringify(loginHistory));

        window.location.href = "dashboard.html";

    } else {
        alert("❌ Invalid Email or Password");
    }
}


// SHOW SIGNUP FORM
function showSignup(){
    document.getElementById("loginForm").style.display = "none";
    document.getElementById("signupForm").style.display = "block";
}

// SHOW LOGIN FORM
function showLogin(){
    document.getElementById("signupForm").style.display = "none";
    document.getElementById("loginForm").style.display = "block";
}

// REGISTER FUNCTION

async function register(){
    const name = document.getElementById("newName").value;
    const email = document.getElementById("newEmail").value;
    const password = document.getElementById("newPassword").value;

    if(name === "" || email === "" || password === ""){
        alert("⚠️ Please fill all fields");
        return;
    }

    try {
        const res = await fetch("http://localhost:5000/signup", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ name, email, password })
        });

        const data = await res.json();
        alert(data.message);

        if(data.message.includes("successful")){
            showLogin();
        }

    } catch (error) {
        alert("❌ Server error");
    }
}


</script>

</body>
</html>
